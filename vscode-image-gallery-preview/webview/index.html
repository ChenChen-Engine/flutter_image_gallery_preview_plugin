<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: var(--vscode-editor-background);
      --fg: var(--vscode-editor-foreground);
      --muted: var(--vscode-descriptionForeground);
      --border: var(--vscode-panel-border);
      --accent: var(--vscode-button-background);
      --accent-fg: var(--vscode-button-foreground);
      --card-bg: color-mix(in srgb, var(--bg) 94%, var(--fg) 6%);
      --card-border: color-mix(in srgb, var(--border) 70%, transparent 30%);
    }

    body {
      margin: 0;
      padding: 10px;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--vscode-font-family);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 3;
      padding-bottom: 8px;
      background: var(--bg);
    }

    input, select, button {
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border, var(--border));
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 12px;
    }

    input { min-width: 190px; }

    button {
      cursor: pointer;
    }

    button[disabled] {
      cursor: default;
      opacity: 0.6;
    }

    button.primary {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
    }

    .toolbar-spacer {
      flex: 1 1 auto;
    }

    .hidden {
      display: none !important;
    }

    .status-column {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      min-width: 150px;
    }

    .status, .page-status {
      color: var(--muted);
      white-space: nowrap;
    }

    .empty {
      margin-top: 18px;
      padding: 22px;
      border: 1px dashed var(--card-border);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
    }

    .section {
      margin-top: 10px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
    }

    .section-title {
      padding: 8px 10px;
      font-weight: 700;
      background: color-mix(in srgb, var(--bg) 90%, var(--fg) 10%);
      border-bottom: 1px solid var(--card-border);
    }

    .section.project .section-title { padding-left: 22px; font-size: 13px; }
    .section.module .section-title { padding-left: 34px; font-size: 12px; }
    .section.directory .section-title { padding-left: 46px; font-size: 12px; color: var(--muted); }

    .section .inner {
      padding: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: var(--card-bg);
      padding: 8px;
    }

    .thumb-wrap {
      position: relative;
    }

    .thumb {
      width: 100%;
      height: 110px;
      object-fit: contain;
      border-radius: 6px;
      background: color-mix(in srgb, var(--bg) 90%, var(--fg) 10%);
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--muted);
      cursor: copy;
    }

    .corner-btn {
      position: absolute;
      top: 6px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid var(--fg);
      background: color-mix(in srgb, var(--bg) 80%, black 20%);
      color: var(--fg);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .md5-btn { left: 6px; }
    .info-btn { right: 6px; }

    .name {
      font-weight: 600;
      margin-top: 8px;
      line-height: 1.2;
      word-break: break-all;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      line-height: 1.3;
      word-break: break-word;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border: 1px solid var(--fg);
      border-radius: 6px;
      background: color-mix(in srgb, var(--bg) 80%, black 20%);
      color: var(--fg);
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease;
      z-index: 50;
      max-width: calc(100vw - 24px);
      word-break: break-word;
    }

    .toast.visible {
      opacity: 1;
    }

    .info-popover {
      position: fixed;
      z-index: 100;
      min-width: 300px;
      max-width: min(560px, calc(100vw - 24px));
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--bg) 82%, black 18%);
      padding: 8px 10px;
      display: none;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .info-popover.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="q" type="search" placeholder="Search file name or MD5" />
    <select id="platform">
      <option value="all">All Platforms</option>
      <option value="android">Android</option>
      <option value="flutter">Flutter</option>
      <option value="ios">iOS</option>
    </select>
    <select id="project" class="hidden">
      <option value="all">All Projects</option>
    </select>
    <select id="module" class="hidden">
      <option value="all">All Modules</option>
    </select>
    <select id="type">
      <option value="all">All Types</option>
    </select>
    <select id="pageSize">
      <option value="60">60 / page</option>
      <option value="120" selected>120 / page</option>
      <option value="240">240 / page</option>
    </select>
    <button id="prev">Prev</button>
    <button id="next">Next</button>
    <button class="primary" id="refresh">Refresh</button>
    <div class="toolbar-spacer"></div>
    <div class="status-column">
      <div class="status" id="status">Visible 0 / Indexed 0</div>
      <div class="page-status" id="pageStatus">Page 1 / 1</div>
    </div>
  </div>

  <div id="root"></div>
  <div class="toast" id="toast"></div>
  <div class="info-popover" id="infoPopover"></div>

  <script>
    const vscode = acquireVsCodeApi();
    const state = {
      all: [],
      query: '',
      platform: 'all',
      projectName: 'all',
      moduleName: 'all',
      type: 'all',
      pageIndex: 0,
      pageSize: 120,
      infoByPath: new Map(),
      isLoading: true
    };

    const q = document.getElementById('q');
    const platform = document.getElementById('platform');
    const projectSelect = document.getElementById('project');
    const moduleSelect = document.getElementById('module');
    const typeSelect = document.getElementById('type');
    const pageSizeSelect = document.getElementById('pageSize');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const refreshBtn = document.getElementById('refresh');
    const status = document.getElementById('status');
    const pageStatus = document.getElementById('pageStatus');
    const root = document.getElementById('root');
    const toast = document.getElementById('toast');
    const infoPopover = document.getElementById('infoPopover');

    let toastTimer = 0;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 1500);
    }

    function setLoading(loading) {
      state.isLoading = loading;
      refreshBtn.disabled = loading;
      if (loading) {
        status.textContent = 'Loading...';
      }
    }

    function fileNameOf(relPath) {
      const slash = Math.max(relPath.lastIndexOf('/'), relPath.lastIndexOf('\\'));
      return slash >= 0 ? relPath.substring(slash + 1) : relPath;
    }

    function platformLabel(platformValue) {
      if (platformValue === 'android') return 'Android';
      if (platformValue === 'flutter') return 'Flutter';
      if (platformValue === 'ios') return 'iOS';
      return platformValue;
    }

    function platformOrder(platformValue) {
      if (platformValue === 'android') return 0;
      if (platformValue === 'flutter') return 1;
      if (platformValue === 'ios') return 2;
      return 9;
    }

    function normalizedGroupPath(groupPath) {
      return groupPath && groupPath !== '.' ? groupPath : '.';
    }

    function sortItems(items) {
      return [...items].sort((a, b) => {
        return (
          platformOrder(a.platform) - platformOrder(b.platform) ||
          a.projectName.localeCompare(b.projectName) ||
          a.moduleName.localeCompare(b.moduleName) ||
          normalizedGroupPath(a.groupPath).localeCompare(normalizedGroupPath(b.groupPath)) ||
          fileNameOf(a.relPath).localeCompare(fileNameOf(b.relPath))
        );
      });
    }

    function itemsForSelectedPlatform() {
      if (state.platform === 'all') {
        return state.all;
      }
      return state.all.filter((item) => item.platform === state.platform);
    }

    function itemsForSelectedProject() {
      return itemsForSelectedPlatform().filter((item) => {
        return state.projectName === 'all' || item.projectName === state.projectName;
      });
    }

    function buildDynamicFilterOptions() {
      const platformItems = itemsForSelectedPlatform();
      const projectItems = itemsForSelectedProject();

      const projects = [...new Set(platformItems.map((item) => item.projectName))].sort((a, b) => a.localeCompare(b));
      const modules = [...new Set(projectItems.map((item) => item.moduleName))].sort((a, b) => a.localeCompare(b));
      const types = [...new Set(state.all.map((item) => item.formatFamily))].sort((a, b) => a.localeCompare(b));

      const oldProject = state.projectName;
      const oldModule = state.moduleName;
      const oldType = state.type;

      projectSelect.innerHTML = '<option value="all">All Projects</option>';
      for (const value of projects) {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        projectSelect.appendChild(option);
      }

      moduleSelect.innerHTML = '<option value="all">All Modules</option>';
      for (const value of modules) {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        moduleSelect.appendChild(option);
      }

      typeSelect.innerHTML = '<option value="all">All Types</option>';
      for (const value of types) {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        typeSelect.appendChild(option);
      }

      if (projects.includes(oldProject)) {
        projectSelect.value = oldProject;
      } else {
        state.projectName = 'all';
        projectSelect.value = 'all';
      }

      if (modules.includes(oldModule)) {
        moduleSelect.value = oldModule;
      } else {
        state.moduleName = 'all';
        moduleSelect.value = 'all';
      }

      if (types.includes(oldType)) {
        typeSelect.value = oldType;
      } else {
        state.type = 'all';
        typeSelect.value = 'all';
      }
    }

    function updateFilterVisibility() {
      if (state.platform === 'all') {
        projectSelect.classList.add('hidden');
        moduleSelect.classList.add('hidden');
        return;
      }

      projectSelect.classList.remove('hidden');
      if (state.platform === 'ios') {
        const moduleCount = [...new Set(itemsForSelectedProject().map((item) => item.moduleName))].length;
        moduleSelect.classList.toggle('hidden', moduleCount <= 1);
      } else {
        moduleSelect.classList.remove('hidden');
      }
    }

    function filteredItems() {
      const query = state.query.trim().toLowerCase();
      return sortItems(state.all.filter((item) => {
        const fileName = fileNameOf(item.relPath).toLowerCase();
        const md5 = (item.md5 || '').toLowerCase();
        const matchesQuery = !query || fileName.includes(query) || md5.includes(query);
        const matchesPlatform = state.platform === 'all' || item.platform === state.platform;
        const matchesProject = state.platform === 'all' || state.projectName === 'all' || item.projectName === state.projectName;
        const matchesModule =
          state.platform === 'all' ||
          moduleSelect.classList.contains('hidden') ||
          state.moduleName === 'all' ||
          item.moduleName === state.moduleName;
        const matchesType = state.type === 'all' || item.formatFamily === state.type;
        return matchesQuery && matchesPlatform && matchesProject && matchesModule && matchesType;
      }));
    }

    function paginate(items) {
      const pageSize = Math.max(1, Number(state.pageSize) || 120);
      const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
      state.pageIndex = Math.min(Math.max(0, state.pageIndex), totalPages - 1);
      const start = state.pageIndex * pageSize;
      const end = Math.min(items.length, start + pageSize);
      return {
        pageIndex: state.pageIndex,
        totalPages,
        items: items.slice(start, end)
      };
    }

    function groupItems(items) {
      const grouped = new Map();
      for (const item of items) {
        if (!grouped.has(item.platform)) grouped.set(item.platform, new Map());
        const projectMap = grouped.get(item.platform);
        if (!projectMap.has(item.projectName)) projectMap.set(item.projectName, new Map());
        const moduleMap = projectMap.get(item.projectName);
        if (!moduleMap.has(item.moduleName)) moduleMap.set(item.moduleName, new Map());
        const dirMap = moduleMap.get(item.moduleName);
        const directory = normalizedGroupPath(item.groupPath);
        if (!dirMap.has(directory)) dirMap.set(directory, []);
        dirMap.get(directory).push(item);
      }

      return [...grouped.keys()].sort((a, b) => platformOrder(a) - platformOrder(b)).map((platformKey) => {
        const projectMap = grouped.get(platformKey);
        const projects = [...projectMap.keys()].sort((a, b) => a.localeCompare(b)).map((projectKey) => {
          const moduleMap = projectMap.get(projectKey);
          const modules = [...moduleMap.keys()].sort((a, b) => a.localeCompare(b)).map((moduleKey) => {
            const dirMap = moduleMap.get(moduleKey);
            const groups = [...dirMap.keys()].sort((a, b) => a.localeCompare(b)).map((groupKey) => ({
              groupPath: groupKey,
              items: dirMap.get(groupKey)
            }));
            return { moduleName: moduleKey, groups };
          });
          return { projectName: projectKey, modules };
        });
        return { platform: platformKey, projects };
      });
    }

    function formatInfoText(info) {
      return [
        `width: ${info.width}`,
        `height: ${info.height}`,
        `color Space: ${info.colorSpace}`,
        `chroma subsampling: ${info.chromaSubsampling}`,
        `bit depth: ${info.bitDepth}`,
        `compression mode: ${info.compressionMode}`,
        `stream size: ${info.streamSize}`,
        `file size: ${info.fileSize}`,
        `format: ${info.format}`,
        `abs path: ${info.absPath}`
      ].join('\n');
    }

    function showInfoPopover(anchor, info) {
      infoPopover.textContent = formatInfoText(info);
      const rect = anchor.getBoundingClientRect();
      const top = Math.min(window.innerHeight - 16, rect.bottom + 6);
      const left = Math.min(window.innerWidth - 320, Math.max(12, rect.left));
      infoPopover.style.top = `${top}px`;
      infoPopover.style.left = `${left}px`;
      infoPopover.classList.add('visible');
    }

    function hideInfoPopover() {
      infoPopover.classList.remove('visible');
    }

    function fallbackInfo(item) {
      return {
        width: item.width != null ? String(item.width) : 'Unknown',
        height: item.height != null ? String(item.height) : 'Unknown',
        colorSpace: 'Unknown',
        chromaSubsampling: 'Unknown',
        bitDepth: 'Unknown',
        compressionMode: 'Unknown',
        streamSize: 'Unknown',
        fileSize: 'Unknown',
        format: (item.format || '').toUpperCase() || 'Unknown',
        absPath: item.absPath
      };
    }

    async function ensureInfo(item) {
      const cached = state.infoByPath.get(item.absPath);
      if (cached) return cached;

      if (item.imageInfo) {
        state.infoByPath.set(item.absPath, item.imageInfo);
        return item.imageInfo;
      }

      const fallback = fallbackInfo(item);
      state.infoByPath.set(item.absPath, fallback);
      vscode.postMessage({ type: 'requestImageInfo', absPath: item.absPath });
      return fallback;
    }

    function renderCard(item) {
      const card = document.createElement('div');
      card.className = 'card';

      const thumbWrap = document.createElement('div');
      thumbWrap.className = 'thumb-wrap';

      let thumb;
      if (item.thumbnailUri && item.canPreviewRaster) {
        thumb = document.createElement('img');
        thumb.src = item.thumbnailUri;
        thumb.className = 'thumb';
        thumb.addEventListener('error', () => {
          const failed = document.createElement('div');
          failed.className = 'thumb';
          failed.textContent = 'Load Failed';
          failed.title = `Load Failed: ${item.absPath}`;
          thumb.replaceWith(failed);
        }, { once: true });
      } else {
        thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.textContent = item.formatFamily.toUpperCase();
      }

      thumb.title = `Click to copy: ${item.copyToken}`;
      thumb.addEventListener('click', () => {
        vscode.postMessage({ type: 'copy', label: 'Path', value: item.copyToken });
        showToast(`Copied Path: ${item.copyToken}`);
      });
      thumb.addEventListener('dblclick', () => vscode.postMessage({ type: 'open', absPath: item.absPath }));

      const md5Btn = document.createElement('button');
      md5Btn.className = 'corner-btn md5-btn';
      md5Btn.textContent = 'M';
      md5Btn.title = `Copy MD5: ${item.md5}`;
      md5Btn.addEventListener('click', (event) => {
        event.stopPropagation();
        vscode.postMessage({ type: 'copy', label: 'MD5', value: item.md5 });
        showToast(`Copied MD5: ${item.md5}`);
      });

      const infoBtn = document.createElement('button');
      infoBtn.className = 'corner-btn info-btn';
      infoBtn.textContent = 'i';
      infoBtn.title = 'Show image info';
      infoBtn.addEventListener('mouseenter', async (event) => {
        const info = await ensureInfo(item);
        showInfoPopover(event.currentTarget, info);
      });
      infoBtn.addEventListener('mouseleave', hideInfoPopover);

      thumbWrap.appendChild(thumb);
      thumbWrap.appendChild(md5Btn);
      thumbWrap.appendChild(infoBtn);

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = fileNameOf(item.relPath);

      const dimension = item.width && item.height ? `${item.width}x${item.height}` : '-';
      const qualifier = item.qualifier ? ` @${item.qualifier}` : '';
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `${platformLabel(item.platform)} | ${item.projectName} | ${item.moduleName} | ${item.formatFamily.toUpperCase()} | ${dimension}${qualifier}`;
      meta.title = item.relPath;

      const actions = document.createElement('div');
      actions.className = 'actions';
      const openBtn = document.createElement('button');
      openBtn.textContent = 'Open';
      openBtn.addEventListener('click', () => vscode.postMessage({ type: 'open', absPath: item.absPath }));
      actions.appendChild(openBtn);

      card.appendChild(thumbWrap);
      card.appendChild(name);
      card.appendChild(meta);
      card.appendChild(actions);
      return card;
    }

    function createSection(title, className) {
      const section = document.createElement('section');
      section.className = `section ${className}`;
      const titleNode = document.createElement('div');
      titleNode.className = 'section-title';
      titleNode.textContent = title;
      const inner = document.createElement('div');
      inner.className = 'inner';
      section.appendChild(titleNode);
      section.appendChild(inner);
      return { section, inner };
    }

    function renderFallback(items) {
      root.innerHTML = '';
      if (!items.length) {
        root.innerHTML = '<div class="empty">No items</div>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'grid';
      for (const item of items) {
        grid.appendChild(renderCard(item));
      }
      root.appendChild(grid);
    }

    function render() {
      const filtered = filteredItems();
      const page = paginate(filtered);
      status.textContent = `Visible ${filtered.length} / Indexed ${state.all.length}`;
      pageStatus.textContent = `Page ${page.pageIndex + 1} / ${page.totalPages}`;
      prevBtn.disabled = page.pageIndex <= 0;
      nextBtn.disabled = page.pageIndex >= page.totalPages - 1;

      root.innerHTML = '';
      if (!page.items.length) {
        root.innerHTML = '<div class="empty">No items</div>';
        return;
      }

      const grouped = groupItems(page.items);
      for (const platformGroup of grouped) {
        const platformSection = createSection(platformLabel(platformGroup.platform), 'platform');

        for (const projectGroup of platformGroup.projects) {
          const projectSection = createSection(projectGroup.projectName, 'project');

          for (const moduleGroup of projectGroup.modules) {
            const moduleSection = createSection(moduleGroup.moduleName, 'module');

            for (const dirGroup of moduleGroup.groups) {
              const title = normalizedGroupPath(dirGroup.groupPath);
              const dirSection = createSection(title, 'directory');
              const grid = document.createElement('div');
              grid.className = 'grid';
              for (const item of dirGroup.items) {
                grid.appendChild(renderCard(item));
              }
              dirSection.inner.appendChild(grid);
              moduleSection.inner.appendChild(dirSection.section);
            }

            projectSection.inner.appendChild(moduleSection.section);
          }

          platformSection.inner.appendChild(projectSection.section);
        }

        root.appendChild(platformSection.section);
      }

      if (!root.children.length) {
        renderFallback(page.items);
      }
    }

    function rebuildAndRender(resetPage) {
      if (resetPage) {
        state.pageIndex = 0;
      }
      buildDynamicFilterOptions();
      updateFilterVisibility();
      render();
    }

    q.addEventListener('input', () => {
      state.query = q.value;
      rebuildAndRender(true);
    });

    platform.addEventListener('change', () => {
      state.platform = platform.value;
      state.projectName = 'all';
      state.moduleName = 'all';
      rebuildAndRender(true);
    });

    projectSelect.addEventListener('change', () => {
      state.projectName = projectSelect.value;
      state.moduleName = 'all';
      rebuildAndRender(true);
    });

    moduleSelect.addEventListener('change', () => {
      state.moduleName = moduleSelect.value;
      rebuildAndRender(true);
    });

    typeSelect.addEventListener('change', () => {
      state.type = typeSelect.value;
      rebuildAndRender(true);
    });

    pageSizeSelect.addEventListener('change', () => {
      state.pageSize = Number(pageSizeSelect.value) || 120;
      rebuildAndRender(true);
    });

    prevBtn.addEventListener('click', () => {
      state.pageIndex = Math.max(0, state.pageIndex - 1);
      render();
    });

    nextBtn.addEventListener('click', () => {
      state.pageIndex += 1;
      render();
    });

    refreshBtn.addEventListener('click', () => {
      setLoading(true);
      vscode.postMessage({ type: 'refresh' });
    });

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (msg?.type === 'assets') {
        state.all = Array.isArray(msg.items) ? msg.items : [];
        for (const item of state.all) {
          if (item.imageInfo) {
            state.infoByPath.set(item.absPath, item.imageInfo);
          }
        }
        setLoading(false);
        rebuildAndRender(false);
      }

      if (msg?.type === 'imageInfo' && typeof msg.absPath === 'string' && msg.info) {
        state.infoByPath.set(msg.absPath, msg.info);
      }
    });

    window.addEventListener('scroll', () => hideInfoPopover(), { passive: true });
    window.addEventListener('resize', () => hideInfoPopover());

    setLoading(true);
    vscode.postMessage({ type: 'ready' });
  </script>
</body>
</html>
