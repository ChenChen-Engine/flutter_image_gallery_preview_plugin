<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Gallery Preview</title>
  <link rel="stylesheet" href="./gallery.css">
</head>
<body>
  <main class="page">
    <header class="toolbar">
      <div class="toolbar-main">
        <input id="searchInput" class="search-input" type="search" placeholder="Search by file name or MD5" autocomplete="off">
        <div class="toolbar-right">
          <div class="zoom-cluster" aria-label="Preview size">
            <span class="zoom-label">Preview Size</span>
            <div class="zoom-controls">
              <button id="zoomOutButton" class="icon-button" type="button" title="缩小预览">−</button>
              <button id="zoomResetButton" class="icon-button" type="button" title="还原默认尺寸">⟲</button>
              <button id="zoomInButton" class="icon-button" type="button" title="放大预览">＋</button>
            </div>
          </div>
          <div id="statusText" class="status-text">Visible 0 / Indexed 0</div>
          <button id="refreshButton" class="primary-button" type="button">Refresh</button>
        </div>
      </div>
      <div class="toolbar-filters">
        <select id="platformFilter" class="filter-select" aria-label="Platform">
          <option value="all">All Platforms</option>
          <option value="android">Android</option>
          <option value="flutter">Flutter</option>
          <option value="ios">iOS</option>
        </select>
        <select id="projectFilter" class="filter-select hidden" aria-label="Project">
          <option value="all">All Projects</option>
        </select>
        <select id="moduleFilter" class="filter-select hidden" aria-label="Module">
          <option value="all">All Modules</option>
        </select>
        <select id="mediaTypeFilter" class="filter-select" aria-label="Media Type">
          <option value="all">All Media</option>
        </select>
        <select id="formatFilter" class="filter-select" aria-label="Format">
          <option value="all">All Formats</option>
        </select>
      </div>
    </header>

    <section id="galleryRoot" class="gallery-root" aria-live="polite"></section>
    <div id="loadMoreSentinel" class="load-more-sentinel" aria-hidden="true"></div>
  </main>

  <div id="loadingOverlay" class="loading-overlay visible">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <div id="loadingMessage" class="loading-message">Indexing assets...</div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="infoModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="infoTitle">Media Info</h2>
        <button class="modal-close" type="button" data-close-modal aria-label="Close">×</button>
      </div>
      <div id="infoContent" class="info-content"></div>
    </div>
  </div>

  <div id="videoModal" class="video-modal hidden" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="video-backdrop" data-close-video></div>
    <div class="video-card">
      <div class="video-topbar">
        <div id="videoTitle" class="video-title"></div>
        <button class="modal-close" type="button" data-close-video aria-label="Close">×</button>
      </div>
      <div class="video-stage">
        <video id="videoPlayer" class="video-player" playsinline></video>
        <button id="videoCenterButton" class="video-center-button" type="button" aria-label="Play or pause">▶</button>
        <div class="video-controls">
          <div class="video-progress-track" id="videoProgressTrack">
            <div class="video-progress-fill" id="videoProgressFill"></div>
          </div>
          <div class="video-control-row">
            <span id="videoTimeLabel" class="video-time-label">00:00 / 00:00</span>
            <select id="videoRateSelect" class="video-rate-select" aria-label="Playback speed"></select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="unsupportedModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Unsupported media">
    <div class="modal-backdrop" data-close-unsupported></div>
    <div class="modal-card unsupported-card">
      <div class="modal-header">
        <h2>Unsupported Media</h2>
        <button class="modal-close" type="button" data-close-unsupported aria-label="Close">×</button>
      </div>
      <div class="unsupported-content">
        <p id="unsupportedMessage">暂不支持播放该格式媒体。</p>
        <div class="unsupported-actions">
          <button id="openDefaultButton" class="primary-button" type="button">用系统默认应用打开</button>
          <button id="openChooserButton" class="primary-button" type="button">选择其他应用打开</button>
          <button id="showInSystemButton" class="primary-button" type="button">在文件管理器中显示</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./lottie-light.min.js"></script>
  <script src="./gallery.js"></script>
</body>
</html>
