<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Gallery Preview</title>
  <link rel="stylesheet" href="./gallery.css">
</head>
<body>
  <main class="page">
    <header class="toolbar">
      <div class="toolbar-search-row">
        <input id="searchInput" class="search-input" type="search" placeholder="Search by file name or MD5" autocomplete="off">
        <button id="syncButton" class="secondary-button" type="button">Sync</button>
        <button id="refreshButton" class="primary-button" type="button">Refresh</button>
        <button id="settingsButton" class="secondary-button" type="button">Settings</button>
      </div>
      <div class="toolbar-filters">
        <select id="platformFilter" class="filter-select" aria-label="Platform">
          <option value="all">All Platforms</option>
          <option value="android">Android</option>
          <option value="flutter">Flutter</option>
          <option value="ios">iOS</option>
        </select>
        <select id="projectFilter" class="filter-select hidden" aria-label="Project">
          <option value="all">All Projects</option>
        </select>
        <select id="moduleFilter" class="filter-select hidden" aria-label="Module">
          <option value="all">All Modules</option>
        </select>
        <select id="mediaTypeFilter" class="filter-select" aria-label="Media Type">
          <option value="all">All Media</option>
        </select>
        <select id="formatFilter" class="filter-select" aria-label="Format">
          <option value="all">All Formats</option>
        </select>
      </div>
      <div class="toolbar-utility-row">
        <div id="statusText" class="status-text">Visible 0 / Indexed 0</div>
      </div>
    </header>

    <section id="galleryRoot" class="gallery-root" aria-live="polite"></section>
    <div id="loadMoreSentinel" class="load-more-sentinel" aria-hidden="true"></div>
    <div class="zoom-cluster" aria-label="Preview size">
      <div class="zoom-controls">
        <button id="zoomOutButton" class="icon-button" type="button" title="Shrink preview">-</button>
        <button id="zoomResetButton" class="icon-button" type="button" title="Reset preview size" aria-label="Reset preview size">
          <svg class="button-svg reset-zoom-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 8V5h3"/>
            <path d="M19 8V5h-3"/>
            <path d="M5 16v3h3"/>
            <path d="M19 16v3h-3"/>
            <path d="M9 12h6"/>
            <path d="M12 9v6"/>
          </svg>
        </button>
        <button id="zoomInButton" class="icon-button" type="button" title="Enlarge preview">+</button>
      </div>
    </div>
  </main>

  <div id="loadingOverlay" class="loading-overlay visible">
    <div class="loading-card">
      <div id="loadingMessage" class="loading-message">Indexing assets...</div>
      <div class="loading-details">
        <div id="loadingPhase" class="loading-detail hidden"></div>
        <div id="loadingCounts" class="loading-detail hidden"></div>
        <div id="loadingFallback" class="loading-detail hidden"></div>
        <div id="loadingCurrent" class="loading-detail hidden"></div>
        <div id="loadingPath" class="loading-path hidden"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="infoModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="infoTitle">Media Info</h2>
        <div class="modal-actions">
          <button id="infoRefreshButton" class="modal-action modal-refresh" type="button" aria-label="Refresh media info" title="Refresh media info">
            <svg class="button-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 11a8 8 0 0 0-14.5-4.5L4 8"/>
              <path d="M4 4v4h4"/>
              <path d="M4 13a8 8 0 0 0 14.5 4.5L20 16"/>
              <path d="M20 20v-4h-4"/>
            </svg>
          </button>
          <button class="modal-action modal-close" type="button" data-close-modal aria-label="Close" title="Close">
            <svg class="button-svg close-svg" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 7l10 10"/>
              <path d="M17 7L7 17"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="infoContent" class="info-content"></div>
    </div>
  </div>

  <script src="./lottie-light.min.js"></script>
  <script src="./gallery.js"></script>
</body>
</html>
